<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>11LABS - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --error: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #09090b);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            opacity: 0.1;
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .brand {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .brand span {
            color: var(--primary);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .msg.error {
            color: var(--error);
        }

        .msg.success {
            color: var(--success);
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tab.active {
            color: white;
            border-color: var(--primary);
            font-weight: 600;
        }

        /* Hidden forms */
        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="card">
            <div class="brand"><i class="fa-solid fa-wave-square"></i> 11<span>LABS</span></div>
            <div class="subtitle">Nền tảng chuyển đổi văn bản thành giọng nói số 1</div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
                <!-- <div class="tab" onclick="switchTab('register')">Đăng ký</div> -->
            </div>

            <!-- REFERRAL LOGIC -->
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const refCode = urlParams.get('r');
                if (refCode) {
                    localStorage.setItem('referral_code', refCode);
                    // Optional: Remove query param from URL for cleaner look
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            </script>
            <!-- MODE SWITCHING & UTIL FUNCTIONS -->
            <!-- LOGIN FORM -->
            <div id="loginForm" class="form-section active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
                </div>
                <div class="form-group" style="position: relative;">
                    <label>Mật khẩu</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="••••••">
                    <a href="javascript:void(0)" onclick="openResetModal()"
                        style="position: absolute; right: 0; bottom: -20px; font-size: 0.8rem; color: var(--text-muted); text-decoration: none;">Quên
                        mật khẩu?</a>
                </div>
                <button class="btn" style="margin-top: 25px;" onclick="handleLogin()">Đăng nhập</button>
            </div>

            <!-- REGISTER FORM DISABLED - TO STOP SPAM -->
            <div id="registerForm" class="form-section" style="text-align: center; padding: 20px 0;">
                <p style="color: var(--text-muted); margin-bottom: 15px;">Để đảm bảo an toàn, hệ thống hiện chỉ hỗ trợ
                    đăng ký tài khoản mới thông qua Google.</p>
                <i class="fa-solid fa-arrow-down"
                    style="color: var(--primary); font-size: 1.5rem; animation: bounce 2s infinite;"></i>
            </div>

            <style>
                @keyframes bounce {

                    0%,
                    20%,
                    50%,
                    80%,
                    100% {
                        transform: translateY(0);
                    }

                    40% {
                        transform: translateY(-10px);
                    }

                    60% {
                        transform: translateY(-5px);
                    }
                }
            </style>

            <div id="messageBox" class="msg"></div>

            <!-- GOOGLE LOGIN -->
            <div style="margin-top: 25px;">
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <div style="padding: 0 15px; color: var(--text-muted); font-size: 0.8rem;">HOẶC</div>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <div id="g_id_onload"
                    data-client_id="721835110651-k7d0gddclu0391vl28v2buk7rf5ugjku.apps.googleusercontent.com"
                    data-context="signin" data-ux_mode="redirect"
                    data-login_uri="https://11labs.id.vn/api/auth/google/callback.php" data-auto_prompt="false">
                </div>

                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_blue"
                    data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="340">
                </div>
            </div>

        </div>


    </div>

    <!-- RESET PASSWORD MODAL -->
    <div id="resetModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px;">
        <div class="card" style="max-width: 400px; padding: 30px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Khôi phục mật khẩu</h2>
            <div class="form-group">
                <label>Nhập Email của bạn</label>
                <input type="email" id="resetEmail" class="form-control" placeholder="name@example.com">
            </div>
            <button class="btn" id="btnSendReset" onclick="handleRequestReset()">Gửi yêu cầu</button>
            <button class="btn" style="background: transparent; border: 1px solid var(--border); margin-top: 10px;"
                onclick="closeResetModal()">Hủy</button>
            <div id="resetMsg" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api'; // Use absolute path from root for robustness

        // Check if already logged in
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'customer';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            showMsg('');
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            if (!email || !pass) return showMsg('Vui lòng nhập đầy đủ thông tin', true);

            showMsg('Đang xử lý...');

            try {
                const res = await fetch(`${API_BASE}/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_email', data.user.email.toLowerCase());
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    showMsg('✅ Đăng nhập thành công! Đang chuyển hướng...', false);
                    setTimeout(() => window.location.href = 'customer', 1000);
                } else {
                    showMsg('❌ ' + (data.error || 'Lỗi đăng nhập'), true);
                }
            } catch (e) {
                console.error('Fetch error:', e);
                showMsg('❌ Lỗi kết nối server: ' + e.message, true);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;

            if (!email || !pass) return showMsg('Vui lòng nhập đầy đủ thông tin', true);

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                return showMsg('❌ Định dạng Email không hợp lệ (Ví dụ: abc@gmail.com)', true);
            }

            if (pass !== confirm) return showMsg('Mật khẩu nhập lại không khớp', true);

            showMsg('Đang đăng ký...');

            try {
                const payload = { email, password: pass };
                const storedRef = localStorage.getItem('referral_code');
                if (storedRef) payload.referral_code = storedRef;

                const response = await fetch(`${API_BASE}/register.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Auto login after register
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_email', data.user.email.toLowerCase());
                        localStorage.setItem('user_data', JSON.stringify(data.user));
                    }
                    showMsg('✅ ' + (data.message || 'Đăng ký thành công!'), false);
                    if (data.token) {
                        setTimeout(() => window.location.href = 'customer', 1500);
                    }
                } else {
                    showMsg('❌ ' + (data.error || 'Lỗi đăng ký'), true);
                }
            } catch (e) {
                console.error('Fetch error:', e);
                showMsg('❌ Lỗi kết nối server: ' + e.message, true);
            }
        }

        function showMsg(text, isError = false) {
            const el = document.getElementById('messageBox');
            el.innerText = text;
            el.className = isError ? 'msg error' : 'msg success';
        }

        function openResetModal() {
            document.getElementById('resetModal').style.display = 'flex';
            document.getElementById('resetMsg').innerText = '';
        }

        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }

        async function handleRequestReset() {
            const email = document.getElementById('resetEmail').value;
            if (!email) return alert('Vui lòng nhập email');

            const btn = document.getElementById('btnSendReset');
            btn.disabled = true;
            btn.innerText = 'Đang gửi...';

            try {
                const res = await fetch(`${API_BASE}/request_reset.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                const msgEl = document.getElementById('resetMsg');
                msgEl.innerText = data.message || data.error;
                msgEl.style.color = res.ok ? 'var(--success)' : 'var(--error)';

                if (res.ok) {
                    setTimeout(closeResetModal, 5000);
                }
            } catch (e) {
                alert('Lỗi kết nối server');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Gửi yêu cầu';
            }
        }

        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').classList.contains('active')) handleLogin();
                else handleRegister();
            }
        });
    </script>
</body>

</html>
