<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-box fade-in">
            <h1 id="siteName">TTS Pro</h1>
            <p class="subtitle">Chuyển văn bản thành giọng nói AI</p>

            <div class="card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Đăng nhập</button>
                    <button class="auth-tab" onclick="switchTab('register')">Đăng ký</button>
                </div>

                <div id="errorBox" class="auth-error"></div>

                <!-- Login Form -->
                <div id="tab-login" class="tab-content active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="doLogin()" id="btnLogin">
                        <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
                    </button>
                </div>

                <!-- Register Form -->
                <div id="tab-register" class="tab-content">
                    <div class="form-group">
                        <label>Tên hiển thị</label>
                        <input type="text" id="regName" placeholder="Tên của bạn">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="doRegister()" id="btnRegister">
                        <i class="fa-solid fa-user-plus"></i> Đăng ký
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'api';

        // Check if already logged in
        if (localStorage.getItem('customer_token')) {
            window.location.href = 'app.html';
        }

        // Extract referral code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || '';
        if (refCode) {
            // Auto switch to register tab if referred
            setTimeout(() => switchTab('register'), 100);
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelector(`.auth-tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
            document.getElementById('errorBox').style.display = 'none';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return showError('Vui lòng nhập email và mật khẩu');

            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-sm"></span> Đang đăng nhập...';

            try {
                const res = await fetch(`${API}/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', email, password })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    localStorage.setItem('customer_token', data.token);
                    localStorage.setItem('customer_user', JSON.stringify(data.user));
                    window.location.href = 'app.html';
                } else {
                    showError(data.error || 'Đăng nhập thất bại');
                }
            } catch (e) {
                showError('Lỗi kết nối server');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Đăng nhập';
        }

        async function doRegister() {
            const display_name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!email || !password) return showError('Vui lòng nhập email và mật khẩu');
            if (password.length < 6) return showError('Mật khẩu tối thiểu 6 ký tự');

            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-sm"></span> Đang đăng ký...';

            try {
                const res = await fetch(`${API}/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', email, password, display_name, ref: refCode })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    localStorage.setItem('customer_token', data.token);
                    localStorage.setItem('customer_user', JSON.stringify(data.user));
                    window.location.href = 'app.html';
                } else {
                    showError(data.error || 'Đăng ký thất bại');
                }
            } catch (e) {
                showError('Lỗi kết nối server');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Đăng ký';
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (document.getElementById('tab-login').classList.contains('active')) doLogin();
                else doRegister();
            }
        });
    </script>
</body>

</html>
